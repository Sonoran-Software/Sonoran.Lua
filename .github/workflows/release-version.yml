name: Release Sonoran.lua

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: sonoran-lua-release-version
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Lua and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks zip cargo
          luarocks install --local dkjson
          cargo install --locked wally --version 0.3.2

      - name: Ensure master branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Releases must be run from the master branch."
            exit 1
          fi

      - name: Bump package version
        id: version
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump }}"
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE="patch"
          fi
          VERSION="$(./scripts/bump-version.sh "$BUMP_TYPE")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate rockspec
        id: rockspec
        run: |
          ROCKSPEC_PATH="$(./scripts/write-rockspec.sh "${{ steps.version.outputs.version }}")"
          echo "path=$ROCKSPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Build FiveM resource
        id: fivem
        run: |
          ARCHIVE_PATH="$(./scripts/build-fivem-resource.sh "${{ steps.version.outputs.version }}")"
          echo "archive=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build Roblox package
        id: roblox
        run: |
          PACKAGE_DIR="$(./scripts/build-roblox-package.sh "${{ steps.version.outputs.version }}")"
          echo "dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fxmanifest.lua
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin HEAD:master "v${{ steps.version.outputs.version }}"

      - name: Publish to LuaRocks
        env:
          LUAROCKS_API: ${{ secrets.LUAROCKS_API }}
          LUA_PATH: /home/runner/.luarocks/share/lua/5.1/?.lua;/home/runner/.luarocks/share/lua/5.1/?/init.lua;;
          LUA_CPATH: /home/runner/.luarocks/lib/lua/5.1/?.so;;
        run: |
          luarocks upload "${{ steps.rockspec.outputs.path }}" --api-key="$LUAROCKS_API"

      - name: Publish Roblox package
        env:
          WALLY_AUTH_TOKEN: ${{ secrets.WALLY_AUTH_TOKEN }}
        run: |
          cd "${{ steps.roblox.outputs.dir }}"
          /home/runner/.cargo/bin/wally login --token "$WALLY_AUTH_TOKEN"
          /home/runner/.cargo/bin/wally publish

      - name: Upload FiveM release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.fivem.outputs.archive }}

      - name: Dispatch SonoranCADFiveM sync
        if: success()
        env:
          DISPATCH_TOKEN: ${{ secrets.SONORAN_REPO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "SONORAN_REPO_DISPATCH_TOKEN is not configured; skipping SonoranCADFiveM sync dispatch."
            exit 0
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            https://api.github.com/repos/Sonoran-Software/SonoranCADFiveM/dispatches \
            -d '{"event_type":"sonoran-lua-updated","client_payload":{"source_repository":"Sonoran-Software/Sonoran.Lua","source_ref":"master","source_version":"v${{ steps.version.outputs.version }}"}}'
